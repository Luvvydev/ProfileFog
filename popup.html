<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>ProfileFog</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <header class="app-header">
      <div class="brand-block">
        <img class="brand-icon" src="icons/icon32.png" alt="ProfileFog">
        <div class="brand-copy">
          <h1>ProfileFog</h1>
          <p id="subtitle">Privacy noise</p>
        </div>
      </div>
      <div class="header-actions">
        <button id="openOptions" class="icon-button" type="button" title="Settings" aria-label="Open settings">⚙</button>
        <label class="switch" title="Enable ProfileFog">
          <input id="enabled" type="checkbox">
          <span></span>
        </label>
      </div>
    </header>

    <section class="status-card">
      <div class="status-main">
        <div class="status-dot" aria-hidden="true"></div>
        <div>
          <strong id="statusText">Loading</strong>
          <p id="nextRun">Checking state</p>
        </div>
      </div>
      <div class="status-actions">
        <button id="cleanHistoryNow" class="secondary-action" type="button" title="Clean matching local Chrome history">Clean</button>
        <button id="runNow" class="primary-action" type="button">Run</button>
      </div>
    </section>

    <section class="metric-row compact" aria-label="ProfileFog totals">
      <div class="metric-card">
        <span class="metric-icon" aria-hidden="true">🛡</span>
        <strong id="blockedTotal">0</strong>
        <span>Blocked</span>
      </div>
      <div class="metric-card">
        <span class="metric-icon" aria-hidden="true">🧹</span>
        <strong id="cleanedTotal">0</strong>
        <span>Cleaned</span>
      </div>
      <div class="metric-card">
        <span class="metric-icon" aria-hidden="true">👁</span>
        <strong id="learnedObservedTotal">0</strong>
        <span>Seen</span>
      </div>
      <div class="metric-card">
        <span class="metric-icon" aria-hidden="true">⚑</span>
        <strong id="learnedReadyTotal">0</strong>
        <span>Ready</span>
      </div>
    </section>

    <section class="site-card">
      <div class="site-head">
        <span class="site-icon" aria-hidden="true">◎</span>
        <div class="site-copy">
          <span id="currentPageInfo" class="inline-hint">Page</span>
          <strong id="currentSiteName">Loading</strong>
          <span id="currentSiteMeta">Trackers appear here.</span>
        </div>
        <button id="pauseSite" class="site-action" type="button">Pause</button>
      </div>
      <div id="currentPageTrackers" class="tracker-list"></div>
    </section>

    <footer>
      <button id="openOptionsFooter" class="footer-link" type="button">All settings</button>
    </footer>
  </main>
  <script src="popup.js"></script>
</body>
</html>
